<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <title>享樂照片搜尋</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        h1 { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; margin-bottom: 20px; }
        
        /* 列表式告示欄樣式 */
        .notice { 
            background: #111; 
            border: 1px solid #00f3ff; 
            color: #fff; 
            padding: 15px; 
            margin: 0 auto 20px auto; 
            border-radius: 12px; 
            width: 90%; 
            text-align: left;
            font-size: 1em; 
            box-shadow: 0 0 10px #00f3ff;
            line-height: 1.6;
            display: inline-block;
        }
        .notice-item { display: block; }

        input { background: #111; border: 2px solid #00f3ff; color: #fff; padding: 20px; font-size: 1.2em; border-radius: 12px; width: 90%; margin-bottom: 20px; text-align: center; }
        button { background: #ff00ff; border: none; padding: 15px 40px; border-radius: 12px; color: #fff; font-size: 1.2em; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px #ff00ff; width: 90%; }
        .result-img { max-width: 95%; border: 3px solid #00f3ff; box-shadow: 0 0 20px #00f3ff; border-radius: 15px; margin-top: 20px; display: block; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>
    <h1>享樂照片搜尋</h1>

    <div class="notice">
        <div class="notice-item">1館 夏威夷 = 1</div>
        <div class="notice-item">2館 沐湯會 = 2</div>
        <div class="notice-item">3館 愛寶 = 3</div>
        <div class="notice-item">4館 = 4</div>
        <div class="notice-item">5館 潘朵拉 = 5</div>
        <div class="notice-item">6館 手中情 = 6</div>
        <div class="notice-item">7館 樂鑽 = 7</div>
    </div>

    <input type="text" id="q" placeholder="例如：3斑比">
    <button onclick="doSearch()">搜尋</button>
    <div id="res"></div>

    <script>
        function doSearch() {
            const q = document.getElementById('q').value;
            const res = document.getElementById('res');
            res.innerHTML = "";
            if (q.length < 2) { alert("請輸入如：3斑比"); return; }
            
            const folder = q.substring(0, 1);
            const keyword = q.substring(1);
            
            let filesToTry = [`${keyword}.jpg`];
            // 自動搜尋客評 1 到 20
            for (let i = 1; i <= 20; i++) { filesToTry.push(`${keyword}-客評${i}.jpg`); }
            
            filesToTry.forEach(fileName => {
                const path = `./${folder}/${fileName}`;
                const img = document.createElement("img");
                img.src = path;
                img.className = "result-img";
                img.style.display = "none";
                img.onload = function() { img.style.display = "block"; };
                img.onerror = function() { img.remove(); };
                res.appendChild(img);
            });
        }
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
