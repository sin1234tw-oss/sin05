<!DOCTYPE html>
<html>
<head>
    <link rel="manifest" href="data:application/json;base64,eyJpY29ucyI6IFt7InNyYyI6ICIiLCAic2l6ZXMiOiAiMTkyeDE5MiIsICJ0eXBlIjogImltYWdlL3BuZyJ9XX0=">
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        input { padding: 10px; width: 70%; }
        button { padding: 10px; }
        .img-card { margin-top: 20px; }
        img { width: 100%; max-width: 400px; border-radius: 10px; }
    </style>
</head>
<body>
    <input type="text" id="q" placeholder="例如: 3斑比">
    <button onclick="runSearch()">搜尋</button>
    <div id="res"></div>

    <script>
        function runSearch() {
            var q = document.getElementById('q').value;
            document.getElementById('res').innerText = "搜尋中...";
            google.script.run.withSuccessHandler(function(data) {
                var res = document.getElementById('res');
                res.innerHTML = "";
                data.forEach(function(i) {
                    res.innerHTML += '<div class="img-card"><p>'+i.name+'</p><img src="'+i.url+'"></div>';
                });
            }).searchFiles(q);
        }
    </script>
</body>
</html>
