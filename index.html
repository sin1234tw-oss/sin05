<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>享樂照片搜尋</title>
    <style>
        body { background: #000; color: #D4AF37; text-align: center; font-family: sans-serif; }
        input { padding: 10px; width: 250px; background: #111; border: 2px solid #D4AF37; color: #fff; }
        button { padding: 10px 20px; background: #D4AF37; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>享樂照片搜尋</h1>
    <input type="text" id="query" placeholder="範例: 3斑比">
    <button onclick="search()">搜尋</button>
    <div id="result" style="margin-top:20px;"></div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzlx2FwzCjxBIPSfuSVw75_t4OOO0EbTLLasQaFTOKUrqGd1MeLk2m0IPvYw4xhJ6NZ/exec";
        
        async function search() {
            const q = document.getElementById("query").value;
            const res = document.getElementById("result");
            res.innerHTML = "搜尋中...";
            try {
                // 加入時間戳記避免快取
                const response = await fetch(GAS_URL + "?q=" + encodeURIComponent(q) + "&t=" + Date.now());
                const data = await response.json();
                res.innerHTML = "";
                if(data.length > 0) {
                    data.forEach(item => {
                        res.innerHTML += `<div><img src="${item.url}" alt="${item.name}"><p>${item.name}</p></div>`;
                    });
                } else {
                    res.innerHTML = "找不到檔案";
                }
            } catch(e) { res.innerHTML = "讀取錯誤"; }
        }
    </script>
</body>
</html>
