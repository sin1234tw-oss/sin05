<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>享樂照片搜尋</title>
</head>
<body style="background:#000; color:#D4AF37; text-align:center; padding:20px;">
    <h1>享樂照片搜尋</h1>
    <input type="text" id="query" placeholder="範例: 3斑比">
    <button onclick="search()">搜尋</button>
    <div id="result" style="margin-top:20px;"></div>

    <script>
        async function search() {
            const q = document.getElementById("query").value;
            const res = document.getElementById("result");
            const url = "https://script.google.com/macros/s/AKfycbzlx2FwzCjxBIPSfuSVw75_t4OOO0EbTLLasQaFTOKUrqGd1MeLk2m0IPvYw4xhJ6NZ/exec?q=" + encodeURIComponent(q);
            
            res.innerHTML = "搜尋中...";
            try {
                const response = await fetch(url);
                const data = await response.json();
                console.log("後端回傳資料:", data); // 按 F12 查看這裡
                
                res.innerHTML = "";
                if(data && data.length > 0) {
                    data.forEach(item => {
                        res.innerHTML += `<div><img src="${item.url}" alt="${item.name}" style="max-width:300px;"><p>${item.name}</p></div>`;
                    });
                } else {
                    res.innerHTML = "找不到檔案 (可能是該資料夾沒有包含此關鍵字的檔案)";
                }
            } catch(e) { 
                res.innerHTML = "讀取錯誤: " + e; 
            }
        }
    </script>
</body>
</html>
