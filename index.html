<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>享樂照片搜尋</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        h1 { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
        input { background: #1a1a1a; border: 2px solid #00d4ff; color: #fff; padding: 12px; border-radius: 8px; width: 70%; margin-bottom: 10px; }
        button { background: #ff00ff; border: none; padding: 12px 20px; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px #ff00ff; }
        .result-item { margin-top: 30px; border: 1px solid #333; padding: 15px; border-radius: 15px; background: #111; }
        img { max-width: 100%; border-radius: 10px; box-shadow: 0 0 15px #00d4ff; }
    </style>
</head>
<body>
    <h1>享樂照片搜尋</h1>
    <input type="text" id="q" placeholder="例如: 3斑比">
    <button onclick="doSearch()">搜尋</button>
    <div id="res"></div>

    <script>
        // 註冊 Service Worker 以實現 PWA 離線功能
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function doSearch() {
            const q = document.getElementById('q').value;
            const folder = q.substring(0, 1);
            const keyword = q.substring(1);
            const res = document.getElementById('res');
            
            // 假設圖片都是 .jpg，如果有些是 .png，這裡可能需要稍微調整
            const imgUrl = `${folder}/${keyword}.jpg`;
            
            res.innerHTML = `
                <div class="result-item">
                    <p>${folder}館 - ${keyword}</p>
                    <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/300?text=無此照片'">
                </div>
            `;
        }
    </script>
</body>
</html>
