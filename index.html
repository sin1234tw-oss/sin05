<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>享樂照片搜尋</title>
    <style>
        body { background: #000; color: #D4AF37; font-family: sans-serif; text-align: center; padding: 20px; }
        input { padding: 12px; width: 250px; background: #111; border: 2px solid #D4AF37; color: #fff; border-radius: 5px; }
        button { padding: 12px 25px; background: #D4AF37; border: none; cursor: pointer; border-radius: 5px; }
        #result { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 30px; }
        img { max-width: 300px; border: 2px solid #D4AF37; }
    </style>
</head>
<body>
    <h1>享樂照片搜尋</h1>
    <input type="text" id="query" placeholder="範例: 3斑比">
    <button onclick="searchPhoto()">搜尋</button>
    <div id="result"></div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzlx2FwzCjxBIPSfuSVw75_t4OOO0EbTLLasQaFTOKUrqGd1MeLk2m0IPvYw4xhJ6NZ/exec";
        
        async function searchPhoto() {
            const query = document.getElementById("query").value;
            const resultDiv = document.getElementById("result");
            if(!query) return;
            
            resultDiv.innerHTML = "搜尋中...";
            try {
                // 使用 encodeURIComponent 確保中文能正確傳遞
                const res = await fetch(GAS_URL + "?q=" + encodeURIComponent(query));
                const data = await res.json();
                
                resultDiv.innerHTML = "";
                if (data.length > 0) {
                    data.forEach(item => {
                        resultDiv.innerHTML += `<img src="${item.url}" alt="${item.name}">`;
                    });
                } else {
                    resultDiv.innerHTML = "找不到喔！請檢查編號或名稱。";
                }
            } catch (e) {
                resultDiv.innerHTML = "連線失敗，請稍後再試。";
            }
        }
    </script>
</body>
</html>
