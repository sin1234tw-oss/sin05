<!DOCTYPE html>
<html>
<body>
    <input type="text" id="q" placeholder="例如: 3斑比">
    <button onclick="search()">搜尋</button>
    <div id="res"></div>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbzlx2FwzCjxBIPSfuSVw75_t4OOO0EbTLLasQaFTOKUrqGd1MeLk2m0IPvYw4xhJ6NZ/exec";
        
        async function search() {
            const q = document.getElementById('q').value;
            const res = document.getElementById('res');
            res.innerHTML = "讀取中...";
            try {
                const r = await fetch(`${url}?q=${encodeURIComponent(q)}&t=${Date.now()}`);
                const d = await r.json();
                res.innerHTML = "";
                if(d.error) res.innerHTML = "錯誤: " + d.error;
                else if(d.length === 0) res.innerHTML = "找不到檔案";
                else d.forEach(i => res.innerHTML += `<p>${i.name}: <a href="${i.url}" target="_blank">下載連結</a></p>`);
            } catch(e) { res.innerHTML = "連線失敗"; }
        }
    </script>
</body>
</html>
