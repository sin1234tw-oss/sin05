<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>享樂照片搜尋</title>
    <style>
        /* 霓虹風格 CSS */
        body { background: #000; color: #ffcc00; font-family: sans-serif; text-align: center; padding: 50px; }
        h1 { font-size: 3em; color: #ffcc00; text-shadow: 0 0 10px #ffcc00, 0 0 20px #ffcc00; margin-bottom: 30px; }
        
        #search-box { background: #1a1a1a; border: 2px solid #ffcc00; padding: 15px; border-radius: 10px; width: 80%; max-width: 500px; color: white; font-size: 1.2em; }
        
        button { background: #ffcc00; border: none; padding: 15px 30px; border-radius: 10px; color: black; font-weight: bold; cursor: pointer; margin-left: 10px; font-size: 1.2em; }
        
        #res { margin-top: 40px; }
        .result-img { max-width: 80%; border: 3px solid #ffcc00; box-shadow: 0 0 20px #ffcc00; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>享樂照片搜尋</h1>
    
    <div>
        <input type="text" id="q" placeholder="格式: 1-照片名稱" id="search-box">
        <button onclick="doSearch()">搜尋</button>
    </div>

    <div id="res"></div>

    <script>
        function doSearch() {
            const input = document.getElementById('q').value;
            const res = document.getElementById('res');
            
            // 解析輸入：假設是用 "-" 分隔，例如 "1-斑比"
            const parts = input.split('-');
            if (parts.length < 2) {
                alert("請依照格式輸入，例如：1-斑比");
                return;
            }
            
            const folder = parts[0];     // 拿到 1
            const filename = parts[1];   // 拿到 斑比
            const imgUrl = `./${folder}/${filename}.jpg`;
            
            res.innerHTML = `
                <p>搜尋：${folder}館 / ${filename}</p>
                <img src="${imgUrl}" class="result-img" onerror="this.src='https://via.placeholder.com/300?text=找不到圖片'">
            `;
        }
    </script>
</body>
</html>
