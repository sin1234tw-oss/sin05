<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        input { width: 80%; padding: 10px; margin-bottom: 10px; }
        .result-item { margin-top: 20px; }
        img { max-width: 100%; border-radius: 8px; }
    </style>
</head>
<body>
    <input type="text" id="q" placeholder="例如: 3斑比">
    <button onclick="doSearch()">搜尋</button>
    <div id="res"></div>

    <script>
        function doSearch() {
            var q = document.getElementById('q').value;
            document.getElementById('res').innerText = "搜尋中...";
            google.script.run.withSuccessHandler(function(data) {
                var res = document.getElementById('res');
                res.innerHTML = "";
                data.forEach(function(i) {
                    res.innerHTML += '<div class="result-item"><p>'+i.name+'</p><img src="'+i.url+'"></div>';
                });
            }).searchFiles(q);
        }
    </script>
</body>
</html>
